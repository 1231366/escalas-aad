/* ============================================================
   PRNG com seed (geração reproduzível)
   ============================================================ */
function makeRng(seed){
  let s = seed >>> 0;
  return () => { s = (s*1664525 + 1013904223) >>> 0; return s / 4294967296; };
}

/* ============================================================
   GERADOR DE ESCALAS (greedy + restrições)
   ============================================================ */
function generateSchedule(){
  const rng = makeRng(state.seed);
  const days = state.periodo;
  const emps = EMPLOYEES;
  const grid = {};
  emps.forEach(e => grid[e.id] = []);

  const nightPool = emps.filter(e => e.pool === 'noite');
  const dayPool   = emps.filter(e => e.pool === 'dia');

  const prev = (e,d) => d === 0 ? 'F' : grid[e.id][d-1];
  const consec = (e,d) => { let c=0; for(let i=d-1;i>=0;i--){ if(grid[e.id][i]!=='F') c++; else break; } return c; };
  const sameStreak = (e,d,s) => { let c=0; for(let i=d-1;i>=0;i--){ if(grid[e.id][i]===s) c++; else break; } return c; };
  const load = (e) => grid[e.id].filter(t=>t!=='F').length;

  for(let d=0; d<days; d++){
    const assigned = {};

    function pick(pool, shift, n){
      let cands = pool.filter(e =>
        !assigned[e.id] &&
        REST_OK[prev(e,d)][shift] &&
        consec(e,d) < MAX_CONSEC
      );
      // scoring: continuar o mesmo turno (padrão MMM/NNN) se streak<3, depois equidade de carga
      cands.forEach(e => e._j = rng()); // desempate estável por seed
      cands.sort((a,b) => {
        const aCont = (prev(a,d)===shift && sameStreak(a,d,shift) < 3) ? 1 : 0;
        const bCont = (prev(b,d)===shift && sameStreak(b,d,shift) < 3) ? 1 : 0;
        if(aCont !== bCont) return bCont - aCont;
        if(load(a) !== load(b)) return load(a) - load(b);
        return a._j - b._j;
      });
      const chosen = cands.slice(0, n);
      chosen.forEach(e => assigned[e.id] = shift);
      return chosen.length;
    }

    // ordem: turno mais restritivo primeiro
    pick(nightPool, 'N', COVERAGE.N);
    pick(dayPool,   'T', COVERAGE.T);
    pick(dayPool,   'M', COVERAGE.M);

    emps.forEach(e => grid[e.id][d] = assigned[e.id] || 'F');
  }

  state.grid = grid;
  state.validation = validateSchedule(grid, days);
}

/* ============================================================
   VALIDADOR — verifica cada regra e devolve estado
   ============================================================ */
function validateSchedule(grid, days){
  const emps = EMPLOYEES;
  const rules = [];

  // R1: cobertura exata por turno/dia
  let coverBad = 0;
  for(let d=0; d<days; d++){
    const cnt = {M:0,T:0,N:0};
    emps.forEach(e => { const t = grid[e.id][d]; if(t!=='F') cnt[t]++; });
    if(cnt.M!==COVERAGE.M || cnt.T!==COVERAGE.T || cnt.N!==COVERAGE.N) coverBad++;
  }
  rules.push({ id:'R1', nome:'Cobertura 4M · 3T · 2N por dia',
    ok: coverBad===0, detalhe: coverBad===0 ? 'Todos os dias cobertos' : `${coverBad} dia(s) sem cobertura completa` });

  // R2: descanso 11h (transições)
  let restBad = 0;
  emps.forEach(e => {
    for(let d=1; d<days; d++){
      if(!REST_OK[grid[e.id][d-1]][grid[e.id][d]]) restBad++;
    }
  });
  rules.push({ id:'R2', nome:'Descanso mínimo de 11h entre turnos',
    ok: restBad===0, detalhe: restBad===0 ? 'Nenhuma transição ilegal' : `${restBad} transição(ões) ilegais` });

  // R3: máx dias consecutivos
  let consBad = 0;
  emps.forEach(e => {
    let c=0;
    for(let d=0; d<days; d++){ if(grid[e.id][d]!=='F'){ c++; if(c>MAX_CONSEC) consBad++; } else c=0; }
  });
  rules.push({ id:'R3', nome:`Máximo ${MAX_CONSEC} dias de trabalho seguidos`,
    ok: consBad===0, detalhe: consBad===0 ? 'Dentro do limite' : `${consBad} excesso(s)` });

  // R4: Manhã e Noite não no mesmo mês (mesma pessoa)
  let mixMN = 0;
  emps.forEach(e => {
    const temM = grid[e.id].includes('M');
    const temN = grid[e.id].includes('N');
    if(temM && temN) mixMN++;
  });
  rules.push({ id:'R4', nome:'Sem Manhã + Noite no mesmo mês (por pessoa)',
    ok: mixMN===0, detalhe: mixMN===0 ? 'Pools separados' : `${mixMN} pessoa(s) com M e N` });

  // R5: 2 fixas à noite
  const fixas = emps.filter(e=>e.fixaNoite);
  const fixasOk = fixas.every(e => grid[e.id].includes('N'));
  rules.push({ id:'R5', nome:'2 funcionárias fixas à noite',
    ok: fixasOk, detalhe: fixasOk ? `${fixas.map(f=>f.nome.split(' ')[0]).join(', ')}` : 'Falha nas fixas' });

  // Horas por pessoa (semana) — deteta horas extra
  const semanas = Math.floor(days/7);
  let extra = 0;
  const horasPorEmp = {};
  emps.forEach(e => {
    const turnos = grid[e.id].filter(t=>t!=='F').length;
    const horas = turnos * 8;
    const alvo = e.contrato==='40h' ? 40 : 37.5;
    const mediaSemana = semanas>0 ? horas/semanas : horas;
    horasPorEmp[e.id] = { turnos, horas, mediaSemana:mediaSemana.toFixed(1), alvo, extra: mediaSemana > alvo + 0.5 };
    if(mediaSemana > alvo + 0.5) extra++;
  });
  rules.push({ id:'R6', nome:'Carga horária dentro do contrato',
    ok: extra===0, warn: extra>0, detalhe: extra===0 ? 'Sem horas extra' : `${extra} pessoa(s) acima do contrato (horas extra)` });

  return { rules, horasPorEmp };
}

function renderGrid(){
  const days = Math.min(state.periodo, 42); // limita render visual a 6 semanas
  const trunc = state.periodo > days;
  const header = `<th class="sticky left-0 bg-white z-10 text-left py-2 px-3 text-xs font-semibold text-slate-500 min-w-[140px] border-b border-edge">Funcionária</th>` +
    Array.from({length:days},(_,d)=>`<th class="py-2 px-0 text-center text-[10px] font-semibold ${isWeekend(d)?'text-teal bg-teal/5':'text-slate-400'} min-w-[28px] border-b border-edge ${d%7===0?'border-l border-edge':''}">${diaLabel(d)}<br><span class="nums">${d+1}</span></th>`).join('');

  const rows = EMPLOYEES.map(e=>{
    const cells = Array.from({length:days},(_,d)=>{
      const s = state.grid[e.id][d];
      return `<td class="p-[2px] text-center ${d%7===0?'border-l border-edge':''} ${isWeekend(d)?'bg-teal/[0.03]':''}">
        <div class="cell w-7 h-7 mx-auto rounded-lg ${SHIFTS[s].solid} ${s==='F'?'text-slate-400':'text-white'} flex items-center justify-center text-[10px] font-bold cursor-default" title="${diaLabel(d)} ${d+1} · ${SHIFTS[s].nome}">${s==='F'?'':s}</div>
      </td>`;
    }).join('');
    const h = state.validation.horasPorEmp[e.id];
    const badge = h.extra ? `<span class="text-[10px] text-amber-600 font-semibold ml-1">+extra</span>` : '';
    return `<tr>
      <td class="sticky left-0 bg-white z-10 py-1.5 px-3 text-xs font-medium whitespace-nowrap border-b border-edge">
        <div class="flex items-center gap-1.5">
          <span class="w-6 h-6 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-[9px] font-bold shrink-0">${initials(e.nome)}</span>
          <span>${e.nome}</span>${e.fixaNoite?`<span class="w-1.5 h-1.5 rounded-full bg-turnoN shrink-0"></span>`:''}

        <div class="text-[10px] text-slate-400 nums pl-7">${h.mediaSemana}h/sem · ${h.turnos} turnos${badge}</div>

    <div class="overflow-x-auto">
      <table class="border-collapse w-full"><thead><tr>${header}</tr></thead><tbody>${rows}</tbody></table>
    </div>
  </div>`;
}

function renderAgendaMobile(){
  const totalWeeks = Math.max(1, Math.ceil(state.periodo/7));
  const w = Math.min(state.adminWeek, totalWeeks-1);
  const start = w*7, end = Math.min(start+7, state.periodo);
  const dayCards = [];
  for(let d=start; d<end; d++){
    const rows = ['M','T','N'].map(s=>{
      const people = employeesOnDay(d,s);
      const chips = people.map(e=>`<span class="w-7 h-7 rounded-full ${SHIFTS[s].solid} text-white text-[10px] font-bold flex items-center justify-center shrink-0" title="${e.nome}">${initials(e.nome)}</span>`).join('');
      return `<div class="flex items-center gap-2 py-1.5">
        <span class="w-14 shrink-0 text-xs font-semibold ${s==='M'?'text-turnoM':s==='T'?'text-turnoT':'text-turnoN'}">${SHIFTS[s].nome}</span>
        <div class="flex items-center gap-1 flex-wrap">${chips || '<span class="text-xs text-slate-300">—</span>'}</div>
      </div>`;
    }).join('');
    const folgaCount = EMPLOYEES.length - ['M','T','N'].reduce((a,s)=>a+employeesOnDay(d,s).length,0);
    dayCards.push(`
      <div class="bg-white rounded-2xl border border-edge shadow-sm p-4 ${isWeekend(d)?'ring-1 ring-teal/15':''}">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-baseline gap-2">
            <span class="font-display font-bold text-lg">${diaLabel(d)}</span>
            <span class="text-slate-400 text-sm nums">Dia ${d+1}</span>
          </div>
          ${isWeekend(d)?'<span class="text-[10px] font-semibold text-teal bg-teal/10 px-2 py-0.5 rounded-full">Fim de semana</span>':''}
        </div>
        ${rows}
        <div class="text-[11px] text-slate-400 mt-1 pt-2 border-t border-edge">${folgaCount} em folga</div>
      </div>`);
  }
  return `
  <div class="md:hidden space-y-3 mb-4">
    <div class="flex items-center justify-between">
      <button onclick="setAdminWeek(-1)" ${w===0?'disabled':''} class="w-10 h-10 flex items-center justify-center rounded-full border border-edge disabled:opacity-30 cursor-pointer">${icon('chevronLeft','w-5 h-5')}</button>
      <span class="text-sm font-semibold text-slate-500">Semana ${w+1} de ${totalWeeks}</span>
      <button onclick="setAdminWeek(1)" ${w>=totalWeeks-1?'disabled':''} class="w-10 h-10 flex items-center justify-center rounded-full border border-edge disabled:opacity-30 cursor-pointer">${icon('chevronRight','w-5 h-5')}</button>
    </div>
    <div class="space-y-3">${dayCards.join('')}</div>
  </div>`;
}

    ok:   { bg:'bg-emerald-50', border:'border-emerald-200', dot:'bg-emerald-500', ic:'check' },
    warn: { bg:'bg-amber-50',   border:'border-amber-200',   dot:'bg-amber-500',   ic:'warn' },
    bad:  { bg:'bg-red-50',     border:'border-red-200',     dot:'bg-red-500',     ic:'xcircle' },
  };
  const cards = rules.map(r=>{
    const st = r.ok ? 'ok' : (r.warn ? 'warn' : 'bad');
    const t = theme[st];
    return `<div class="p-3 rounded-xl border ${t.bg} ${t.border} flex items-start gap-2.5">
      <span class="w-6 h-6 rounded-full ${t.dot} text-white flex items-center justify-center shrink-0 mt-0.5">${icon(t.ic,'w-3.5 h-3.5')}</span>
      <div class="min-w-0">
        <div class="text-xs font-semibold">${r.nome}</div>
        <div class="text-[11px] text-slate-500">${r.detalhe}</div>
      </div>
    </div>`;
  }).join('');
  return `
  <div class="bg-white rounded-2xl border border-edge shadow-sm p-4 mb-4">
    <h3 class="font-semibold text-sm mb-3">Validação de regras <span class="text-slate-400 font-normal">· período de ${state.periodo} dias</span></h3>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">${cards}</div>
  </div>`;
}

function renderPedidos(){
  const swapRows = state.swaps.map((s,i)=>`
    <div class="flex items-center justify-between gap-3 p-3 rounded-xl bg-slate-50 text-sm">
      <span class="flex items-center gap-2 min-w-0"><span class="text-slate-400 shrink-0">${icon('swap','w-4 h-4')}</span><span class="truncate"><strong>${s.de}</strong> ⇄ <strong>${s.para}</strong> · dia ${s.dia}</span></span>
      <div class="flex items-center gap-2 shrink-0">
        <span class="text-[11px] px-2 py-1 rounded-full font-medium ${s.estado==='Aprovada'?'bg-emerald-100 text-emerald-700':s.estado==='Recusada'?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700'}">${s.estado}</span>
        <button onclick="resolveSwap(${i},true)" class="text-xs px-3 py-1.5 rounded-lg bg-teal text-white font-medium hover:bg-tealdk active:scale-95 transition cursor-pointer">Aprovar</button>
      </div>
    </div>`).join('') || '<p class="text-sm text-slate-400 p-2">Sem trocas.</p>';
  const feriasRows = state.ferias.map((f,i)=>`
    <div class="flex items-center justify-between gap-3 p-3 rounded-xl bg-slate-50 text-sm">
      <span class="flex items-center gap-2 min-w-0"><span class="text-slate-400 shrink-0">${icon('sun','w-4 h-4')}</span><span class="truncate"><strong>${f.emp}</strong> · dias ${f.inicio}–${f.fim}</span></span>
      <div class="flex items-center gap-2 shrink-0">
        <span class="text-[11px] px-2 py-1 rounded-full font-medium ${f.estado==='Aprovada'?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'}">${f.estado}</span>
        <button onclick="resolveFerias(${i})" class="text-xs px-3 py-1.5 rounded-lg bg-teal text-white font-medium hover:bg-tealdk active:scale-95 transition cursor-pointer">Aprovar</button>
      </div>
    </div>`).join('') || '<p class="text-sm text-slate-400 p-2">Sem pedidos.</p>';
  return `
  <div class="mb-6">
    <h1 class="font-display font-extrabold text-2xl md:text-3xl tracking-tight">Pedidos</h1>
    <p class="text-slate-500 mt-0.5">Trocas e férias — cada aprovação revalida as regras</p>
  </div>
  <div class="grid lg:grid-cols-2 gap-4 md:gap-6">
    <div class="bg-white rounded-2xl border border-edge shadow-sm p-5">
      <h3 class="font-semibold mb-3">Trocas de turno</h3>
      <div class="space-y-2">${swapRows}</div>
    </div>
    <div class="bg-white rounded-2xl border border-edge shadow-sm p-5">
      <h3 class="font-semibold mb-3">Férias</h3>
      <div class="space-y-2">${feriasRows}</div>
    </div>
  </div>`;
}

/* ============================================================
   RENDER — SHELL FUNCIONÁRIA
   ============================================================ */
function renderEmployee(){
  const emp = EMPLOYEES.find(e=>e.id===state.currentEmp);
  let content = '';
  if(state.empTab==='horario') content = renderMeuHorario(emp);
  if(state.empTab==='troca')   content = renderPedirTroca(emp);
  if(state.empTab==='ferias')  content = renderPedirFerias(emp);
  const title = EMP_TABS.find(t=>t[0]===state.empTab)[1];

  return `
  <div class="min-h-dvh bg-canvas pb-24 md:pb-10">
    <header class="pt-safe" style="background:linear-gradient(135deg,#0E7C7B,#0A5F5E);">
      <div class="max-w-4xl mx-auto px-5 md:px-6 pt-3 md:pt-5 pb-4 md:pb-5 flex items-center justify-between text-white">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-11 h-11 rounded-2xl bg-white/15 flex items-center justify-center font-display font-extrabold text-lg shrink-0">${initials(emp.nome)}</div>
          <div class="min-w-0">
            <div class="font-semibold leading-tight truncate">${emp.nome}</div>
            <div class="text-xs text-white/70 truncate">Pool ${emp.pool} · contrato ${emp.contrato}</div>
          </div>
        </div>
        <button onclick="go('login')" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-white/10 cursor-pointer shrink-0" aria-label="Sair">${icon('logout','w-5 h-5')}</button>
      </div>
      <div class="hidden md:flex max-w-4xl mx-auto px-6 gap-2 pb-4">
        ${EMP_TABS.map(([k,l,ic])=>`<button onclick="setEmpTab('${k}')" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition cursor-pointer ${state.empTab===k?'bg-white text-tealdk':'text-white/80 hover:bg-white/10'}">${icon(ic,'w-4 h-4')}${l}</button>`).join('')}
      </div>
    </header>
    <div class="md:hidden px-5 pt-4 pb-1">
      <h1 class="font-display font-extrabold text-2xl tracking-tight">${title}</h1>
    </div>
    <div class="max-w-4xl mx-auto px-4 md:px-6 py-4 md:py-6 view-enter">
      ${content}
    </div>
    <nav class="md:hidden fixed bottom-0 inset-x-0 z-30 bg-white/90 backdrop-blur-md border-t border-edge pb-safe">
      <div class="grid grid-cols-3">
        ${EMP_TABS.map(([k,l,ic])=>`
          <button onclick="setEmpTab('${k}')" class="flex flex-col items-center justify-center gap-1 py-2.5 min-h-[52px] cursor-pointer ${state.empTab===k?'mnav-active':'text-slate-400'}">
            <span class="mnav-pill flex items-center justify-center w-9 h-7 rounded-full">${icon(ic,'w-5 h-5')}</span>
            <span class="text-[10.5px] font-medium">${l}</span>
          </button>`).join('')}
      </div>
    </nav>
  </div>`;
}

function renderMeuHorario(emp){
  if(!state.grid) return `<div class="bg-white rounded-2xl border border-edge shadow-sm p-10 text-center text-slate-400">A escala ainda não foi publicada.</div>`;
  const h = state.validation.horasPorEmp[emp.id];
  const days = Math.min(state.periodo, 28);
  // agrupa por semanas
  let semanas = '';
  for(let w=0; w*7<days; w++){
    const cells = Array.from({length:7},(_,i)=>{
      const d = w*7+i; if(d>=days) return '';
      const s = state.grid[emp.id][d];
      return `<div class="min-w-[104px] md:min-w-0 md:flex-1 snap-start rounded-2xl ${SHIFTS[s].solid} ${s==='F'?'text-slate-500':'text-white'} p-3 text-center shrink-0 md:shrink">
        <div class="text-[10px] opacity-70">${diaLabel(d)} ${d+1}</div>
        <div class="font-bold text-sm mt-0.5">${s==='F'?'Folga':SHIFTS[s].nome}</div>
        <div class="text-[10px] opacity-70 nums mt-0.5">${SHIFTS[s].horas}</div>
      </div>`;
    }).join('');
    semanas += `<div class="mb-3">
      <div class="text-xs font-semibold text-slate-400 mb-1.5 px-0.5">Semana ${w+1}</div>
      <div class="flex gap-2 overflow-x-auto no-scrollbar snap-x snap-mandatory pb-1 md:overflow-visible">${cells}</div>
    </div>`;
  }
  return `
  <div class="grid grid-cols-3 gap-2.5 md:gap-3 mb-5 md:mb-6">
    ${kpi('calendar','Horas / semana', h.mediaSemana, `alvo ${h.alvo}h`, h.extra)}
    ${kpi('bolt','Turnos', h.turnos, `em ${state.periodo} dias`)}
    ${kpi('sun','Folgas', state.grid[emp.id].filter(t=>t==='F').length, 'no período')}
  </div>
  <div class="bg-white rounded-2xl border border-edge shadow-sm p-4 md:p-5">
    <h3 class="font-semibold mb-4">Próximas semanas</h3>
    ${semanas}
  </div>`;
}

function renderPedirTroca(emp){
  const colegas = EMPLOYEES.filter(e=>e.id!==emp.id && e.pool===emp.pool);
  const opts = colegas.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('');
  return `
  <div class="bg-white rounded-2xl border border-edge shadow-sm p-5 md:p-6 max-w-lg">
    <div class="flex items-center gap-2 mb-1"><span class="text-teal">${icon('swap','w-5 h-5')}</span><h3 class="font-semibold">Propor troca de turno</h3></div>
    <p class="text-sm text-slate-500 mb-4">O sistema simula a troca e só a permite se todas as regras se mantiverem.</p>
    <div class="space-y-3">
      <div>
        <label class="text-xs font-semibold text-slate-500">O meu dia (1–${state.periodo})</label>
        <input id="swapMyDay" type="number" inputmode="numeric" min="1" max="${state.periodo}" value="1" class="w-full mt-1 px-3 py-2.5 rounded-xl border border-edge text-base md:text-sm focus:outline-none focus:ring-2 focus:ring-teal/40 focus:border-teal">
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-500">Colega</label>
        <select id="swapColega" class="w-full mt-1 px-3 py-2.5 rounded-xl border border-edge text-base md:text-sm bg-white focus:outline-none focus:ring-2 focus:ring-teal/40">${opts}</select>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-500">Dia da colega (1–${state.periodo})</label>
        <input id="swapColDay" type="number" inputmode="numeric" min="1" max="${state.periodo}" value="2" class="w-full mt-1 px-3 py-2.5 rounded-xl border border-edge text-base md:text-sm focus:outline-none focus:ring-2 focus:ring-teal/40 focus:border-teal">
      </div>
      <button onclick="simulateSwap(${emp.id})" class="w-full py-3 rounded-xl bg-teal text-white font-semibold hover:bg-tealdk active:scale-[.98] transition cursor-pointer">Verificar e enviar</button>
    </div>
    <div id="swapResult" class="mt-4"></div>
  </div>`;
}

function renderPedirFerias(emp){
  return `
  <div class="bg-white rounded-2xl border border-edge shadow-sm p-5 md:p-6 max-w-lg">
    <div class="flex items-center gap-2 mb-1"><span class="text-teal">${icon('sun','w-5 h-5')}</span><h3 class="font-semibold">Pedir férias</h3></div>
    <p class="text-sm text-slate-500 mb-4">O sistema verifica se a cobertura se mantém no período.</p>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="text-xs font-semibold text-slate-500">Dia início</label>
        <input id="fInicio" type="number" inputmode="numeric" min="1" max="${state.periodo}" value="10" class="w-full mt-1 px-3 py-2.5 rounded-xl border border-edge text-base md:text-sm focus:outline-none focus:ring-2 focus:ring-teal/40 focus:border-teal">
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-500">Dia fim</label>
        <input id="fFim" type="number" inputmode="numeric" min="1" max="${state.periodo}" value="16" class="w-full mt-1 px-3 py-2.5 rounded-xl border border-edge text-base md:text-sm focus:outline-none focus:ring-2 focus:ring-teal/40 focus:border-teal">
      </div>
    </div>
    <button onclick="pedirFerias(${emp.id})" class="w-full mt-4 py-3 rounded-xl bg-teal text-white font-semibold hover:bg-tealdk active:scale-[.98] transition cursor-pointer">Enviar pedido</button>
    <div id="fResult" class="mt-4"></div>
  </div>`;
}

/* ============================================================
   AÇÕES
   ============================================================ */
function render(){
  const app = document.getElementById('app');
  if(state.view==='login')    app.innerHTML = renderLogin();
  if(state.view==='admin')    app.innerHTML = renderAdmin();
  if(state.view==='employee') app.innerHTML = renderEmployee();
}
function go(v){ state.view=v; render(); }
function setAdminTab(t){ state.adminTab=t; render(); }
function setEmpTab(t){ state.empTab=t; render(); }
function setAdminWeek(delta){
  const totalWeeks = Math.max(1, Math.ceil(state.periodo/7));
  state.adminWeek = Math.min(Math.max(state.adminWeek+delta, 0), totalWeeks-1);
  render();
}
function setPeriodo(v){ state.periodo=parseInt(v); state.adminWeek=0; }
function toggleOvertime(){ state.allowOvertime=!state.allowOvertime; }
function regen(){ state.seed = Math.floor(Math.random()*100000); state.adminWeek=0; generateSchedule(); render(); }

function sendInvite(){
  const el = document.getElementById('inviteEmail');
  if(el && el.value){ state.invites.push({email:el.value, estado:'Pendente'}); render(); }
}
function resolveSwap(i, ok){ state.swaps[i].estado = ok?'Aprovada':'Recusada'; render(); }
function resolveFerias(i){ state.ferias[i].estado='Aprovada'; render(); }

// Simula troca: aplica no grid clonado e revalida
function simulateSwap(empId){
  const myDay = parseInt(document.getElementById('swapMyDay').value)-1;
  const colId = parseInt(document.getElementById('swapColega').value);
  const colDay = parseInt(document.getElementById('swapColDay').value)-1;
  const res = document.getElementById('swapResult');
  if(!state.grid){ res.innerHTML = msg('bad','Não há escala gerada.'); return; }

  const clone = {}; EMPLOYEES.forEach(e=> clone[e.id]=[...state.grid[e.id]]);
  const a = clone[empId][myDay], b = clone[colId][colDay];
  clone[empId][myDay] = b; clone[colId][colDay] = a;

  const v = validateSchedule(clone, state.periodo);
  const falhas = v.rules.filter(r=>!r.ok && !r.warn);
  if(falhas.length===0){
    state.grid = clone; state.validation = validateSchedule(clone, state.periodo);
    const col = EMPLOYEES.find(e=>e.id===colId);
    state.swaps.push({de:EMPLOYEES.find(e=>e.id===empId).nome, para:col.nome, dia:myDay+1, estado:'Pendente'});
    res.innerHTML = msg('ok','Troca válida — todas as regras mantidas. Pedido enviado à colega.');
  } else {
    res.innerHTML = msg('bad','Troca bloqueada: '+falhas.map(f=>f.nome).join('; ')+'.');
  }
  render();
  // reabre a aba troca com o resultado (render recria o DOM)
  setTimeout(()=>{ const r=document.getElementById('swapResult'); if(r) r.innerHTML = falhas.length===0?msg('ok','Troca válida e enviada.'):msg('bad','Troca bloqueada: '+falhas.map(f=>f.nome).join('; ')+'.'); },0);
}

function pedirFerias(empId){
  const ini = parseInt(document.getElementById('fInicio').value)-1;
  const fim = parseInt(document.getElementById('fFim').value)-1;
  const res = document.getElementById('fResult');
  if(!state.grid){ res.innerHTML = msg('bad','Não há escala gerada.'); return; }

  // testa: pôr a pessoa a folga no período e ver se cobertura aguenta
  const clone = {}; EMPLOYEES.forEach(e=> clone[e.id]=[...state.grid[e.id]]);
  for(let d=ini; d<=fim; d++){ if(clone[empId][d]!==undefined) clone[empId][d]='F'; }
  const v = validateSchedule(clone, state.periodo);
  const cobertura = v.rules.find(r=>r.id==='R1');
  const emp = EMPLOYEES.find(e=>e.id===empId);
  if(cobertura.ok){
    state.ferias.push({emp:emp.nome, inicio:ini+1, fim:fim+1, estado:'Pendente'});
    res.innerHTML = msg('ok','Cobertura mantida no período. Pedido enviado à administração.');
  } else {
    res.innerHTML = msg('warn','Atenção: a cobertura fica em risco neste período ('+cobertura.detalhe+'). A administração terá de reorganizar antes de aprovar.');
  }
}

function msg(type, text){
  const theme = {
    ok:   { bg:'bg-emerald-50', border:'border-emerald-200', text:'text-emerald-800', ic:'check' },
    warn: { bg:'bg-amber-50',   border:'border-amber-200',   text:'text-amber-800',   ic:'warn' },
    bad:  { bg:'bg-red-50',     border:'border-red-200',     text:'text-red-800',     ic:'xcircle' },
  }[type];
  return `<div class="p-3 rounded-xl border ${theme.bg} ${theme.border} ${theme.text} text-sm flex items-start gap-2">
    <span class="shrink-0 mt-0.5">${icon(theme.ic,'w-4 h-4')}</span><span>${text}</span>
  </div>`;
}

/* ============================================================
   ARRANQUE
   ============================================================ */
generateSchedule();
render();
</script>
